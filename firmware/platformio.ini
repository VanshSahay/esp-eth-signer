; ESP8266 Ethereum Transaction Signer

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
monitor_filters = direct
build_flags =
    -D ESP8266_BOARD
    -I include
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson @ ^6.21.3
    ; secp256k1 is vendored in lib/secp256k1/ with ESP8266 patches

